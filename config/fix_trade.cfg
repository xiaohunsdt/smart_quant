[DEFAULT]
ConnectionType=initiator
HeartBtInt=30
ReconnectInterval=5
FileStorePath=logs/store/trade
FileLogPath=logs/fix/trade
StartTime=00:00:00
EndTime=00:00:00
UseDataDictionary=Y
DataDictionary=config/spec/FIX44.xml
ResetOnLogon=Y
ResetOnLogout=N
ResetOnDisconnect=N
SocketNodelay=Y
SocketReuseAddress=Y

# ── cTrader FIX Trade ──────────────────────────────────────────────────────────
# Same SenderCompID/TargetCompID as MD session.
# Trade port is typically 5202 (verify with your broker).
[SESSION]
BeginString=FIX.4.4
SenderCompID=YOUR_ACCOUNT_NUMBER
TargetCompID=CSERVER
SocketConnectHost=YOUR_BROKER_FIX_HOST
SocketConnectPort=5202
Username=YOUR_CTRADE_LOGIN
Password=YOUR_PASSWORD
