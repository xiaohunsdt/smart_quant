[DEFAULT]
ConnectionType=initiator
HeartBtInt=30
ReconnectInterval=5
FileStorePath=logs/store/md
FileLogPath=logs/fix/md
StartTime=00:00:00
EndTime=00:00:00
UseDataDictionary=Y
DataDictionary=config/spec/FIX44.xml
ResetOnLogon=Y
ResetOnLogout=N
ResetOnDisconnect=N
SocketNodelay=Y
SocketReuseAddress=Y

# ── cTrader FIX Market Data ────────────────────────────────────────────────────
# Replace these with values from your broker's cTrader FIX API settings page.
# Common brokers: IC Markets, Pepperstone, FxPro, etc.
# TargetCompID is almost always "CSERVER" for cTrader.
# Ports vary by broker: MD is typically 5201, Trade is 5202.
[SESSION]
BeginString=FIX.4.4
SenderCompID=live4.icmarkets.6121598
TargetCompID=CSERVER
TargetSubID=QUOTE
SocketConnectHost=h30.p.ctrader.com
SocketConnectPort=5201
Username=6121598
Password=wy19960921!

# ── Symbol configuration ───────────────────────────────────────────────────────
# cTrader FIX requires a numeric symbol ID in Tag 55 (not the ticker string).
# To find the ID: open cTrader → click the symbol in the Active Symbol Panel →
# expand "Symbol info" at the bottom → read "FIX Symbol ID".
# SymbolName is used only for logging and the MDReqID prefix.
SymbolName=XAUUSD
# SymbolID=41 is a common default but MUST be verified for your specific account.
# To find the correct ID: cTrader desktop → click XAUUSD in the watchlist →
# scroll down to "Symbol info" → look for "FIX Symbol ID" at the bottom.
SymbolID=41
